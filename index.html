<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى آياتي 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kufam:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Kufam', sans-serif;
            overflow-x: hidden;
            position: relative;
            background-color: #ffb6c1;
        }
        .bg-first {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffb6c1;
            background-image: radial-gradient(#fff 10%, transparent 10%), radial-gradient(#fff 10%, transparent 10%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            z-index: 1;
        }
        .bg-second {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 2;
            opacity: 0;
            display: none;
            transition: opacity 0.8s ease;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.3);
            z-index: 3;
            display: none;
        }
        .content-wrapper {
            text-align: center;
            padding: 25px;
            width: 310px;
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .message-text {
            color: #d81b60;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.8;
            margin-bottom: 20px;
            white-space: pre-line;
            position: relative;
            z-index: 11;
        }
        /* إجبار فيديو القطط على الظهور في المقدمة وفوق النصوص دائماً */
        .video-container {
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 99; /* فوق كل الطبقات */
        }
        .video-container video {
            width: 100%;
            height: 160px;
            object-fit: contain;
            border-radius: 12px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            height: 50px;
            position: relative;
            margin-top: 15px;
            z-index: 12;
        }
        button {
            padding: 10px 30px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Kufam', sans-serif;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #4caf50; color: white; }
        #noBtn { background-color: #f44336; color: white; transition: all 0.1s ease; position: absolute; }
        .name-style {
            font-size: 26px;
            color: #d81b60;
            margin-top: 20px;
            font-weight: 800;
            display: none;
            animation: pulse 1.5s infinite;
            position: relative;
            z-index: 15;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        .heart {
            position: fixed;
            top: -20px;
            color: #ff004f;
            font-size: 24px;
            animation: fall linear forwards;
            z-index: 100;
        }
        @keyframes fall { to { transform: translateY(105vh); } }
    </style>
</head>
<body>

    <div class="bg-first" id="bgFirst"></div>
    <div class="bg-second" id="bgSecond"></div>
    <div class="overlay" id="bgOverlay"></div>

    <div class="content-wrapper" id="mainBox">
        <div class="video-container">
            <video autoplay loop muted playsinline>
                <source src="cute(MP4).mp4" type="video/mp4">
            </video>
        </div>

        <div class="message-text" id="question">هلا يالطولك غصن يتمايل بگلبي
تغيب الروح بغيابك ... وَرِدها
وكتاب الشوك يمدلل.. وَرٓدها
روحي بفركتُك يذبل. وَرِدها
ماي انت وترد الرُوح بْيه

بكثر ما واكف متانيك
كعد ضلي وبقيت اني
حبيبي مشتاقلي ؟؟</div>

        <div class="buttons" id="btnGroup">
            <button id="yesBtn" onclick="selectYes()">نعم</button>
            <button id="noBtn" ontouchstart="moveButton(event)" onmouseover="moveButton(event)" onclick="moveButton(event)">لا</button>
        </div>

        <div id="loveName" class="name-style">آياتي🥹❤️</div>
    </div>

    <audio id="loveSong" src="song.mp3" preload="auto"></audio>

    <script>
        function tryLoadGirlImage(bgElement) {
            const urls = [
                'girl.jpg', 'girl.png', 'girl.jpeg', 'girl.JPG',
                '%D8%B5%D9%88%D8%B1%D8%A9%20%D9%81%D8%AA%D8%A7%D8%A9.jpg',
                '%D8%B5%D9%88%D8%B1%D8%A9%20%D9%81%D8%AA%D8%A7%D8%A9.png'
            ];
            let img = new Image();
            let index = 0;
            img.onload = function() { bgElement.style.backgroundImage = "url('" + urls[index] + "')"; };
            img.onerror = function() { index++; if (index < urls.length) { img.src = urls[index]; } };
            img.src = urls[index];
        }

        function moveButton(e) {
            e.preventDefault();
            const noBtn = document.getElementById('noBtn');
            const padding = 60;
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function selectYes() {
            const bgSecond = document.getElementById('bgSecond');
            const bgOverlay = document.getElementById('bgOverlay');
            
            // جلب صورة الفتاة لتملأ الخلفية بالكامل
            tryLoadGirlImage(bgSecond);
            
            bgSecond.style.display = 'block';
            bgOverlay.style.display = 'block';
            setTimeout(() => { bgSecond.style.opacity = '1'; }, 50);

            // تم تعديل الكود لتبقى القطط موجودة وتتحرك في الواجهة الثانية أيضاً فوق الكلمات!
            document.getElementById('question').innerHTML = "اني وياك وأتحمل كل ضروفك\nلو تغیب سنین صدك ما أعوفك .";
            document.getElementById('mainBox').style.background = "rgba(255, 255, 255, 0.75)";
            document.getElementById('btnGroup').style.display = 'none';
            document.getElementById('loveName').style.display = 'block';
            
            const audio = document.getElementById('loveSong');
            audio.play().catch(function(error) { console.log("Audio play failed"); });
            setInterval(createHeart, 250);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>

</body>
</html>
